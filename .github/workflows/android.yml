name: android ci

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up jdk 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: grant execute permission for gradlew
      run: chmod +x gradlew

    - name: build with gradle
      run: ./gradlew app:assembleRelease
        
    - name: rename unsigned apk
      run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/NoStorageRestrict.apk

    - name: upload unsigned apk
      uses: actions/upload-artifact@v4
      with:
        name: NoStorageRestrict.apk
        path: app/build/outputs/apk/release/NoStorageRestrict.apk
